name: Publish release

# Manual-only while the guarded local publisher remains authoritative.
# Enabling release:published before registry trust is validated would create
# two competing publishers for the same immutable version.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing release version without the v prefix
        required: true
        type: string

concurrency:
  group: python-release-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Resolve and verify version
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ inputs.version }}"
          expected="${expected#v}"
          actual=$(python - <<'PY'
          import tomllib
          print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])
          PY
          )
          test "$actual" = "$expected"
      - name: Test and build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build ruff twine pytest pytest-asyncio
          python -m pip install -e ".[dev]" || python -m pip install -e .
          ruff check src tests
          pytest -q
          python -m build
          twine check dist/*
      - name: Clean-install smoke
        run: |
          python -m venv /tmp/iicp-release-smoke
          /tmp/iicp-release-smoke/bin/pip install dist/*.whl
          /tmp/iicp-release-smoke/bin/python -c 'import iicp_client; print(iicp_client.__version__)'
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ inputs.version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ inputs.version }}
          path: dist
      - name: Select publishing authentication
        id: auth
        shell: bash
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "scoped_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "scoped_token=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to PyPI with OIDC
        if: steps.auth.outputs.scoped_token == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Publish to PyPI with scoped-token fallback
        if: steps.auth.outputs.scoped_token == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
